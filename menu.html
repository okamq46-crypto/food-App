<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Menu</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    nav {
      background: black;
      padding: 10px;
      margin-bottom: 20px;
    }

    nav a {
      color: white;
      margin-right: 15px;
      text-decoration: none;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      text-align: center;
    }

    img {
      width: 120px;
    }

    button {
      padding: 10px;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="menu.html">Menu</a>
  <a href="product.html">Product</a>
  <a href="cart.html">Cart</a>
</nav>

<h1>🍔 Menu</h1>

<div class="card">
  <img src="img/burger.png.jpg">
  <h3>Burger</h3>
  <p>$20</p>
  <button onclick="location.href='product.html'">View</button>
</div>

<div class="card">
  <img src="img/pizza.png.jpg">
  <h3>Pizza</h3>
  <p>$32</p>
  <button onclick="location.href='product.html'">View</button>
</div>

<div class="card">
  <img src="img/fries.png.jpg">
  <h3>Fries</h3>
  <p>$15</p>

</div>

<div class="card">
  <img src="img/pasta.png.jpg">
  <h3>Pasta</h3>
  <p>$18</p>

</div>

</html>
