<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cart</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: black;
      padding: 10px;
      margin-bottom: 20px;
    }

    nav a {
      color: white;
      margin-right: 15px;
      text-decoration: none;
    }

    .item {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
    }

    img {
      width: 60px;
    }

    button {
      padding: 10px;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
      width: 100%;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="menu.html">Menu</a>
  <a href="product.html">Product</a>
  <a href="cart.html">Cart</a>
</nav>

<h1>🛒 Cart</h1>

<div class="item">
  <span><img src="img/burger.png.jpg"> Burger</span>
  <span>$20</span>
</div>

<div class="item">
  <span><img src="img/pizza.png.jpg"> Pizza</span>
  <span>$32</span>
</div>

<h3>Total: $52</h3>

<button>Checkout</button>

</body>
</html>
